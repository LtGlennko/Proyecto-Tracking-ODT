services:

  # ──────────────────────────────────────────────
  # PostgreSQL 15
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: tracking-otd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB:       ${DB_NAME}
      PGDATA:            /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tracking-net

  # ──────────────────────────────────────────────
  # pgAdmin 4 — GUI para administrar la BD
  # ──────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tracking-otd-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@kaufmann.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tracking-net

  # ──────────────────────────────────────────────
  # API NestJS — solo en docker-compose.override.yml
  # se agrega en desarrollo; aquí es stub para producción
  # ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: tracking-otd-api
    restart: unless-stopped
    environment:
      NODE_ENV:         production
      PORT:             ${PORT:-3000}
      DB_HOST:          postgres          # ← nombre del servicio, NO localhost
      DB_PORT:          5432
      DB_USER:          ${DB_USER}
      DB_PASS:          ${DB_PASS}
      DB_NAME:          ${DB_NAME}
      DB_SSL:           ${DB_SSL:-false}
      AZURE_TENANT_ID:  ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID:  ${AZURE_CLIENT_ID}
      AZURE_B2C_POLICY: ${AZURE_B2C_POLICY}
      AZURE_B2C_DOMAIN: ${AZURE_B2C_DOMAIN}
      LOG_LEVEL:        ${LOG_LEVEL:-info}
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tracking-net
    profiles:
      - full   # solo se levanta con: docker compose --profile full up

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  tracking-net:
    driver: bridge
