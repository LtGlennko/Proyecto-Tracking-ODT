# ─────────────────────────────────────────
# postgresql.conf — Tracking OTD (desarrollo)
# ─────────────────────────────────────────

# Conexiones
listen_addresses = '*'
max_connections = 100
superuser_reserved_connections = 3

# Memoria
shared_buffers = 256MB
effective_cache_size = 1GB
work_mem = 16MB
maintenance_work_mem = 128MB

# WAL y checkpoints
wal_buffers = 16MB
checkpoint_completion_target = 0.9
min_wal_size = 256MB
max_wal_size = 1GB

# Logging — útil en desarrollo para ver las queries lentas
log_min_duration_statement = 500      # logea queries > 500ms
log_statement = 'none'                # cambiar a 'all' para debug total
log_duration = off
log_line_prefix = '%t [%p] %u@%d '
log_timezone = 'America/Lima'

# Locale
datestyle = 'iso, dmy'
timezone = 'America/Lima'
lc_messages = 'en_US.utf8'
lc_monetary = 'es_PE.UTF-8'
lc_numeric = 'es_PE.UTF-8'
lc_time = 'es_PE.UTF-8'
default_text_search_config = 'pg_catalog.spanish'

# Performance
random_page_cost = 1.1               # para SSD
effective_io_concurrency = 200       # para SSD
